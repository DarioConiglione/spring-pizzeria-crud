<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Benvenuti in Pizzeria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
                url('https://cdn.pixabay.com/photo/2017/12/09/08/18/pizza-3007395_1280.jpg');
            background-size: cover;
            background-position: center;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }
    </style>
</head>

<body>

    <nav th:replace="~{fragments/navbar :: main-navbar}"></nav>

    <div class="hero-section">
        <div class="container">
            <h1 class="display-1 fw-bold">Benvenuti da Java Pizza</h1>
            <p class="lead mb-4">La vera pizza cotta nel forno... a codice!</p>
            <a th:href="@{/pizze}" class="btn btn-warning btn-lg px-5">Vedi il Menù</a>
        </div>
    </div>

    <footer class="text-center py-4 bg-light mt-5">
        <p>&copy; 2024 - Gestione Pizzeria Spring Boot</p>
    </footer>

</body>

</html>
